syntax = "proto3";

option java_package = "by.niaprauski.data.datastore";
option java_multiple_files = true;

message AppSettingsEntity {
    bool is_welcome_message = 1;
    bool is_visually_enabled = 3;
    int32 min_duration = 4;
    int32 max_duration = 5;
    string accent_color_hex = 6;
    string background_color_hex = 7;
    float accent_position = 8;
    float background_position = 9;
    int32 playlist_limit_size = 10;
    bool is_like_track_priority = 11;
    int32 liked_track_percent = 12;
    bool is_auto_play_on_start= 13;
}